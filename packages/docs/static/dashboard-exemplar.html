<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Exemplar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script type="module" src="./dashboard-exemplar.js"></script>
  <style>
    :root {
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    }
    body {
      margin: 0;
      background: var(--background);
      color: var(--foreground);
      font-family: var(--font-sans);
      height: 100vh;
      overflow: hidden;
    }
    body:not(:has(dashboard-exemplar-app:defined)) {
      opacity: 0;
    }
    body {
      transition: opacity 0.15s ease;
    }
  </style>
</head>
<body>
  <dashboard-exemplar-app></dashboard-exemplar-app>
</body>
</html>
